name: fast-fixture-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  temporal-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: "0.11.23"
      - name: Install Python
        run: uv python install 3.11
      - name: Sync locked environment
        run: uv sync --frozen --group dev
      - name: Lint
        run: make lint
      - name: Build synthetic oracle
        run: make data-sample
      - name: Temporal correctness
        run: make test-temporal
      - name: Unit tests
        run: make test-unit
      - name: Delta sample snapshot and time travel
        run: make test-lakehouse
      - name: Build sample lakehouse
        run: make build-lakehouse DATASET=sample
